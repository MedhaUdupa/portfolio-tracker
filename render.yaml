# Render Blueprint — deploys the whole app as ONE free web service.
# The build step compiles the React frontend, which FastAPI then serves.
# Set DATABASE_URL in the Render dashboard to your Neon Postgres URL.
services:
  - type: web
    name: portfolio-tracker
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the dashboard
      - key: PYTHON_VERSION
        value: 3.12.0
